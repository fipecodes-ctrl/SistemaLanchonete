<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍩 Donut System ULTRA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background: linear-gradient(135deg,#4e6cff,#ff6ec7);
    color:white;
}

/* LOGIN */
#login{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background: rgba(255,255,255,0.2);
    padding:30px;
    border-radius:15px;
    text-align:center;
}

input{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}

/* BOTÃO */
.btn{
    background:white;
    color:#ff4dc4;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

/* SISTEMA */
#app{display:none;}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
}

nav{
    display:flex;
    justify-content:center;
    gap:10px;
}

nav button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.section{display:none;padding:20px;}
.active{display:block;}

.card{
    background: rgba(255,255,255,0.2);
    padding:15px;
    margin:10px;
    border-radius:15px;
}

.grid{display:flex;flex-wrap:wrap;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>🔐 Login</h2>
        <input id="user" placeholder="Usuário"><br>
        <input id="pass" type="password" placeholder="Senha"><br>
        <button class="btn" onclick="logar()">Entrar</button>
        <p id="erro"></p>
    </div>
</div>

<!-- SISTEMA -->
<div id="app">

<header>🍩 Donut System ULTRA</header>

<nav>
<button onclick="show('cardapio')">Cardápio</button>
<button onclick="show('carrinho')">Carrinho</button>
<button onclick="show('pagamento')">Pagamento</button>
</nav>

<!-- CARDÁPIO -->
<div id="cardapio" class="section active">
<h2>🍔 Cardápio</h2>
<div class="grid" id="menu"></div>
</div>

<!-- CARRINHO -->
<div id="carrinho" class="section">
<h2>🛒 Carrinho</h2>
<ul id="lista"></ul>
<p id="total"></p>
<button class="btn" onclick="show('pagamento')">Ir pagar</button>
</div>

<!-- PAGAMENTO -->
<div id="pagamento" class="section">
<h2>💳 Pagamento</h2>

<button class="btn" onclick="pix()">Pix</button>
<button class="btn" onclick="cartao()">Cartão</button>

<div id="areaPagamento"></div>
</div>

</div>

<script>

// LOGIN
function logar(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "123"){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
    } else {
        document.getElementById("erro").textContent="❌ Login inválido";
    }
}

// PRODUTOS
const produtos = [
{nome:"X-Burguer",preco:15},
{nome:"Pizza",preco:30},
{nome:"Batata",preco:10},
{nome:"Donut 🍩",preco:8},
{nome:"Milkshake",preco:12}
];

let carrinho = [];

// MENU
function render(){
    let menu = document.getElementById("menu");
    produtos.forEach(p=>{
        let div = document.createElement("div");
        div.className="card";
        div.innerHTML=`
        <h3>${p.nome}</h3>
        <p>R$${p.preco}</p>
        <button class="btn" onclick="add('${p.nome}',${p.preco})">Adicionar</button>
        `;
        menu.appendChild(div);
    });
}

// ADD
function add(nome,preco){
    carrinho.push({nome,preco});
    renderCarrinho();
}

// CARRINHO
function renderCarrinho(){
    let lista = document.getElementById("lista");
    lista.innerHTML="";
    let total=0;

    carrinho.forEach(i=>{
        total+=i.preco;
        let li=document.createElement("li");
        li.textContent=i.nome+" - R$"+i.preco;
        lista.appendChild(li);
    });

    document.getElementById("total").textContent="Total: R$ "+total;
}

// TROCAR
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// PIX
function pix(){
    let area = document.getElementById("areaPagamento");
    area.innerHTML=`
        <p>📱 Escaneie o QR Code (fake)</p>
        <p>🔑 Chave Pix: donut@system.com</p>
        <button class="btn" onclick="finalizar()">Confirmar Pagamento</button>
    `;
}

// CARTÃO
function cartao(){
    let area = document.getElementById("areaPagamento");
    area.innerHTML=`
        <input placeholder="Número do cartão"><br>
        <input placeholder="Nome"><br>
        <input placeholder="CVV"><br>
        <button class="btn" onclick="finalizar()">Pagar</button>
    `;
}

// FINALIZAR
function finalizar(){
    alert("✅ Pagamento aprovado!");
    carrinho=[];
    renderCarrinho();
    show('cardapio');
}

// INIT
render();

</script>

</body>
</html>
